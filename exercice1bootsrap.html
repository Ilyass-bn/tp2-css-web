<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.box{
    height:100px;
    border:3px solid rgb(0,148,185);
}
.border1{
    width:104px;
    height:330px;
    border:1px solid rgb(0, 0, 0);
}

</style>

</head>
<body>

<div class="container mt-5">
<div class="row g-5">

    <div class="col-md-3 text-center">
        <div class="border1 p-2">
            <div class="box bg-danger-subtle"></div>
            <div class="box bg-warning mt-2"></div>
            <div class="box bg-primary mt-2"></div>
        </div>
        <h4>Figure 1</h4>
    </div>

    <div class="col-md-3 text-center">
        <div class="border p-2">
            <div class="row">
                <div class="col-4 box bg-danger-subtle"></div>
            </div>
            <div class="row mt-2 justify-content-center">
                <div class="col-4 box bg-warning"></div>
            </div>
            <div class="row mt-2 justify-content-end">
                <div class="col-4 box bg-primary"></div>
            </div>
        </div>
        <h4>Figure 2</h4>
    </div>

    <div class="col-md-3 text-center">
        <div class="border p-2">
            <div class="box bg-danger-subtle w-100"></div>
            <div class="d-flex justify-content-between mt-2">
                <div class="box bg-warning w-50"></div>
                <div class="box bg-primary w-50"></div>
            </div>
        </div>
        <h4>Figure 3</h4>
    </div>

    <div class="col-md-3 text-center">
        <div class="border p-2">
            <div class="d-flex justify-content-between">
                <div class="box bg-danger-subtle w-50"></div>
                <div class="box bg-primary w-50"></div>
            </div>
            <div class="mt-2">
                <div class="box bg-warning w-50"></div>
            </div>
        </div>
        <h4>Figure 4</h4>
    </div>

</div>
</div>

</body>
</html>
