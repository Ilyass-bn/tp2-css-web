<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platforme eServices</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f4f6f9;
        }
        .login-box{
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
        }
        .login-box h1{
            font-size:24px;
            margin-bottom:25px;
            text-align:center;
        }
        .login-box button{
            width:100%;
        }
        .footer-text{
            font-size:13px;
            text-align:center;
            margin-top:20px;
            color:gray;
        }
    </style>
</head>
<body>

<div class="container vh-100 d-flex align-items-center">
    <div class="row w-100">

        <div class="col-lg-7 d-none d-lg-block">
            <img src="main.png" class="img-fluid rounded shadow" width="600">
        </div>

        <div class="col-lg-5 col-md-8 mx-auto">
            <div class="login-box">

                <h1>Platforme eServices</h1>

                <form>
                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="Entrez votre nom d'utilisateur">
                    </div>

                    <div class="mb-3">
                        <input type="password" class="form-control" placeholder="Saisir votre mot de passe">
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label" for="remember">
                            Se rappeler de moi
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary">Se connecter</button>

                    <hr>

                    <div class="text-center">
                        <a href="#" class="d-block">Mot de passe oublié ?</a>
                        <a href="#" class="d-block">Questions ?</a>
                    </div>

                    <div class="footer-text">
                        Copyright © 2020 - Tous droits réservés
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

</body>
</html>
